{%extends 'base.html' %}
{% block title %}Home{% endblock %}
{% block body %}


<div class="container py-5">
    {% if user.is_authenticated %} <!-- Primero condicionamos -->
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-body">
                    <h3 class="text-center md-4">Bienvenidos a este CRM</h3>
                    {% else %} <!-- Colocamos sino -->
                    <h1 class="text-center md-4">Ingrese al Sistema</h1>
                    <form method="POST" action="{% url 'home' %}">
                        {% csrf_token %}<!-- Token para validadr que el login sea correcto-->
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="" class="form-label">Usuario</label><input type="text" name="username" class="form-control" required>
                                <div class="col-md-6"></div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="" class="form-label">Email</label><input type="email" name="email" class="form-control">
                                <div class="col-md-6"></div>
                            </div>
                        </div>
                        <div class="col-md-12 mb-3">
                            <label for="" class="form-label">Clave</label><input type="password" name="password" class="form-control" required>
                            <div class="col-md-6"></div>
                        </div>
                        <button class="btn btn-primary btn-bg" type="submit">Iniciar Sesión</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
